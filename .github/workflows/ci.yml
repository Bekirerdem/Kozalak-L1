name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - name: Show Forge version
        run: forge --version

      - name: Forge build (with --sizes)
        run: forge build --sizes

      - name: Forge fmt check
        run: forge fmt --check

      - name: Check src has Solidity files
        id: check_src
        run: |
          if find src -name "*.sol" 2>/dev/null | grep -q .; then
            echo "has_contracts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_contracts=false" >> "$GITHUB_OUTPUT"
            echo "::notice::src/ klasörü boş, Sprint 1'de Template 1 yazılınca testler aktif olacak"
          fi

      - name: Forge tests (fuzz 10000 runs)
        if: steps.check_src.outputs.has_contracts == 'true'
        run: forge test --fuzz-runs 10000 -vvv

      - name: Forge coverage
        if: steps.check_src.outputs.has_contracts == 'true'
        run: forge coverage --ir-minimum --report lcov --report summary
        continue-on-error: true
        timeout-minutes: 15

      - name: Upload coverage
        if: steps.check_src.outputs.has_contracts == 'true'
        uses: codecov/codecov-action@v5
        with:
          files: ./lcov.info
          fail_ci_if_error: false

  slither:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Check src has Solidity files
        id: check_src
        run: |
          if find src -name "*.sol" 2>/dev/null | grep -q .; then
            echo "has_contracts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_contracts=false" >> "$GITHUB_OUTPUT"
            echo "::notice::src/ boş — Slither atlanıyor (Sprint 1 sonrası aktif)"
          fi

      - name: Install Foundry
        if: steps.check_src.outputs.has_contracts == 'true'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - name: Run Slither
        if: steps.check_src.outputs.has_contracts == 'true'
        uses: crytic/slither-action@v0.4.0
        with:
          fail-on: medium
          slither-args: --filter-paths "lib/|test/" --exclude-informational

  aderyn:
    name: Aderyn Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Check src has Solidity files
        id: check_src
        run: |
          if find src -name "*.sol" 2>/dev/null | grep -q .; then
            echo "has_contracts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_contracts=false" >> "$GITHUB_OUTPUT"
            echo "::notice::src/ boş — Aderyn atlanıyor (Sprint 1 sonrası aktif)"
          fi

      - name: Install Aderyn (pre-built binary)
        if: steps.check_src.outputs.has_contracts == 'true'
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/Cyfrin/aderyn/releases/latest/download/aderyn-installer.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.aderyn/bin" >> "$GITHUB_PATH"

      - name: Verify Aderyn install
        if: steps.check_src.outputs.has_contracts == 'true'
        run: aderyn --version

      - name: Run Aderyn
        if: steps.check_src.outputs.has_contracts == 'true'
        run: aderyn .
        continue-on-error: true
